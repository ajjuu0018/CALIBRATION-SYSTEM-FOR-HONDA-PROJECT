<!DOCTYPE html>
<html>
<head>
    <title>Add Gauge</title>
</head>
<body>

<h2>Add Gauge (Master System)</h2>

<form method="POST">

    <input type="text" name="master_key" placeholder="Master Key" required><br><br>

    <input type="text" name="gauge_name" placeholder="Gauge Name" required><br><br>

    <input type="text" name="gauge_type" placeholder="Gauge Type" required><br><br>

    <input type="text" name="color" placeholder="Color (Green/Yellow)" required><br><br>

    <input type="text" name="department" placeholder="Department" required><br><br>

    <button type="submit">Add Gauge</button>

</form>

</body>
</html>
